<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leeroy's Birthday!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column; 
            justify-content: center; 
            align-items: center;     
            min-height: 100vh;      
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes colorCycle {
            0%, 100% { color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.8); }
            25% { color: #ffffff; text-shadow: 0 0 15px #ffd700; }
            50% { color: #ffffff; text-shadow: 0 0 15px #00ff00; }
            75% { color: #ffffff; text-shadow: 0 0 15px #0000ff; }
        }

        @keyframes popIn {
            0% { opacity: 0; transform: translateY(20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        h1 {
            font-size: clamp(2rem, 8vw, 5rem); 
            margin-bottom: 30px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: colorCycle 5s infinite, popIn 1.2s ease-out forwards;
            text-align: center;
            padding: 0 20px;
        }

        #timer-container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 40px 60px;
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: popIn 1.5s ease-out forwards;
            text-align: center;
        }

        #timer {
            font-size: clamp(1.5rem, 5vw, 4rem);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <h1 id="header">It's going to be Leeroy's birthday in...</h1>
    
    <div id="timer-container">
        <div id="timer">Calculating...</div>
    </div>

    <script>
        /** * TARGET: March 28, 2026 @ 12:00 AM Pacific Time
         * ISO 8601 Format: YYYY-MM-DDTHH:mm:ss-07:00 
         * (-07:00 is the offset for PDT which will be active in March)
         */
        const targetDate = new Date("2026-03-28T00:00:00-07:00").getTime();

        const x = setInterval(function() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Update the display
            if (distance > 0) {
                document.getElementById("timer").innerHTML = 
                    days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
            } else {
                // Time has arrived!
                clearInterval(x);
                triggerCelebration();
            }
        }, 1000);

        function triggerCelebration() {
            document.getElementById("header").innerHTML = "HAPPY BIRTHDAY LEEROY!";
            document.getElementById("timer").innerHTML = "IT'S PARTY TIME! 🎂";
            
            var duration = 60 * 1000;
            var animationEnd = Date.now() + duration;
            var colors = ['#ffffff', '#ff0000', '#ffd700', '#00ff00', '#00ffff'];

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 80,
                    origin: { x: 0, y: 0.8 },
                    colors: colors
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 80,
                    origin: { x: 1, y: 0.8 },
                    colors: colors
                });

                if (Date.now() < animationEnd) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
